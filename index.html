<!DOCTYPE html>
<html>
<head>
    <title>Surprise 😎</title>
</head>

<body style="text-align:center; background:black; color:white; font-family:Arial;">

    <h2>شفتي 😎 هادشي برمجة ديالي أنا، ماشي ساهلة 🔥</h2>

    <button onclick="like()" style="padding:15px; font-size:18px; margin:10px;">
        كا 👍
    </button>

    <button onclick="dislike()" style="padding:15px; font-size:18px; margin:10px;">
        ماكا 👎
    </button>

    <p id="msg" style="margin-top:20px;"></p>

    <script>
    function like() {
        document.getElementById("msg").innerHTML = "واااعر 😄 عجبك الحال 👍🔥";
    }

    function dislike() {
        document.getElementById("msg").innerHTML = "هاها 😅 غادي نطوّرها أكثر المرة الجاية 💪";
    }
    </script>

</body>
</html>
